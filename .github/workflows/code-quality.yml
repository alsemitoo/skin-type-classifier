name: Lint, Format & Type Check

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --extra dev
          uv tree

      - name: Ruff — lint
        run: |
          uv run ruff check .

      - name: Ruff — format check
        run: |
          uv run ruff format . --check
